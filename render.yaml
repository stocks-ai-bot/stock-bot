services:
  - type: web
    name: stock-bot-1-daily-news
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot1_daily_news:app
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_DAILY_NEWS
        sync: false
